AWSTemplateFormatVersion: '2010-09-09'
Description: Interview Assistant — S3 + CloudFront + Route53

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging, dev]
  DomainName:
    Type: String
    Default: interview-assistant.kotahirau.com
  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID for kotahirau.com
  CertificateArn:
    Type: String
    Description: ACM certificate ARN (must be in us-east-1 for CloudFront)

Resources:
  # ── S3 bucket (private, CloudFront OAC) ──────────────────────────────────
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ia-frontend-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── CloudFront Origin Access Control ──────────────────────────────────────
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ia-oac-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${WebsiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}

  # ── CloudFront distribution ────────────────────────────────────────────────
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Comment: !Sub Interview Assistant (${Environment})
        DefaultRootObject: index.html
        Aliases:
          - !If [IsProd, !Ref DomainName, !Sub '${Environment}.${DomainName}']

        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig: {}

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6   # CachingOptimized
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03  # SecurityHeadersPolicy
          Compress: true
          AllowedMethods: [GET, HEAD, OPTIONS]

        # SPA routing: return index.html for 403/404
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

        PriceClass: PriceClass_100  # US + EU only — cheapest
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  # ── Route53 DNS ────────────────────────────────────────────────────────────
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If [IsProd, !Ref DomainName, !Sub '${Environment}.${DomainName}']
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2   # CloudFront hosted zone (constant)
        EvaluateTargetHealth: false

Conditions:
  IsProd: !Equals [!Ref Environment, prod]

Outputs:
  BucketName:
    Value: !Ref WebsiteBucket
    Export:
      Name: !Sub InterviewAssistant-${Environment}-BucketName

  DistributionId:
    Value: !Ref Distribution
    Export:
      Name: !Sub InterviewAssistant-${Environment}-DistributionId

  DistributionDomain:
    Value: !GetAtt Distribution.DomainName

  SiteUrl:
    Value: !Sub https://${DomainName}
