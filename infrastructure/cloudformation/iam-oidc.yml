AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GitHub Actions OIDC role for Interview Assistant CI/CD.
  Deploy this stack once manually before CI/CD runs.

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organisation or username (e.g. limeng0427)
    Default: limeng0427
  GitHubRepo:
    Type: String
    Description: GitHub repository name
    Default: interview-assistant
  Environment:
    Type: String
    Default: prod
  OIDCProviderArn:
    Type: String
    Description: Existing GitHub Actions OIDC provider ARN in this account
    Default: arn:aws:iam::329351092147:oidc-provider/token.actions.githubusercontent.com

Resources:
  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ia-github-deploy-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
      Policies:
        - PolicyName: DeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # S3 access for frontend + lambda packages
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: '*'

              # CloudFront invalidation
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetDistribution
                Resource: '*'

              # Lambda update
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:GetFunction
                  - lambda:PublishVersion
                Resource: !Sub arn:aws:lambda:*:${AWS::AccountId}:function:ia-*

              # CloudFormation deploy
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                Resource: !Sub arn:aws:cloudformation:*:${AWS::AccountId}:stack/ia-*

              # IAM for CloudFormation (pass role)
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:AttachRolePolicy
                  - iam:PutRolePolicy
                  - iam:GetRole
                  - iam:PassRole
                  - iam:TagRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/ia-*

              # DynamoDB (for stack deploys)
              - Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DescribeTable
                  - dynamodb:UpdateTable
                  - dynamodb:TagResource
                Resource: !Sub arn:aws:dynamodb:*:${AWS::AccountId}:table/interview-assistant-*

              # API Gateway
              - Effect: Allow
                Action:
                  - apigateway:*
                Resource: '*'

              # Route53
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                Resource: '*'

              # Cognito (for auth stack deploys)
              - Effect: Allow
                Action:
                  - cognito-idp:CreateUserPool
                  - cognito-idp:UpdateUserPool
                  - cognito-idp:DescribeUserPool
                  - cognito-idp:CreateUserPoolClient
                  - cognito-idp:UpdateUserPoolClient
                  - cognito-idp:DescribeUserPoolClient
                  - cognito-idp:CreateUserPoolDomain
                  - cognito-idp:UpdateUserPoolDomain
                  - cognito-idp:DeleteUserPoolDomain
                  - cognito-idp:DescribeUserPoolDomain
                  - cognito-idp:CreateIdentityProvider
                  - cognito-idp:UpdateIdentityProvider
                  - cognito-idp:DeleteIdentityProvider
                  - cognito-idp:TagResource
                Resource: !Sub arn:aws:cognito-idp:*:${AWS::AccountId}:userpool/*

Outputs:
  DeployRoleArn:
    Value: !GetAtt DeployRole.Arn
    Description: Add this as AWS_DEPLOY_ROLE_ARN secret in GitHub
