AWSTemplateFormatVersion: '2010-09-09'
Description: Interview Assistant — DynamoDB table

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging, dev]

Resources:
  InterviewTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub interview-assistant-${Environment}
      BillingMode: PAY_PER_REQUEST   # on-demand — cheapest for low/variable traffic
      TableClass: STANDARD
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: updatedAt
          AttributeType: S

      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

      # GSI for listing sessions by type + date (needed until user auth is added)
      GlobalSecondaryIndexes:
        - IndexName: TypeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  TableName:
    Value: !Ref InterviewTable
    Export:
      Name: !Sub InterviewAssistant-${Environment}-TableName

  TableArn:
    Value: !GetAtt InterviewTable.Arn
    Export:
      Name: !Sub InterviewAssistant-${Environment}-TableArn
