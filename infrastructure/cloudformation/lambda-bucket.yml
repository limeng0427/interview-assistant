AWSTemplateFormatVersion: '2010-09-09'
Description: Interview Assistant — S3 bucket for Lambda deployment packages

# Deploy this stack once before the backend stack.

Parameters:
  Environment:
    Type: String
    Default: prod

Resources:
  LambdaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub ia-lambda-deployments-${Environment}-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30

Outputs:
  BucketName:
    Value: !Ref LambdaBucket
    Export:
      Name: !Sub InterviewAssistant-${Environment}-LambdaBucket
