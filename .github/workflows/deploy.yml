name: Deploy Interview Assistant

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: ap-southeast-2
  ENVIRONMENT: prod

jobs:
  # ── Detect which parts changed ───────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
      infra:    ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            infra:
              - 'infrastructure/**'

  # ── Frontend: type-check + build + deploy ───────────────────────────────
  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        env:
          VITE_AI_API_URL:             ${{ secrets.VITE_AI_API_URL }}
          VITE_COGNITO_USER_POOL_ID:   ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID:      ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN:         ${{ secrets.VITE_COGNITO_DOMAIN }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        if: github.ref == 'refs/heads/main'
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.FRONTEND_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ secrets.FRONTEND_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        if: github.ref == 'refs/heads/main'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── Backend: type-check + bundle + deploy ───────────────────────────────
  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Type check
        working-directory: backend
        run: npm run type-check

      - name: Bundle Lambda
        working-directory: backend
        run: npm run bundle

      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Lambda package to S3
        if: github.ref == 'refs/heads/main'
        run: |
          aws s3 cp backend/lambda.zip \
            s3://${{ secrets.LAMBDA_BUCKET_NAME }}/backend/lambda.zip

      - name: Update Lambda function code
        if: github.ref == 'refs/heads/main'
        run: |
          for fn in ia-sessions-${{ env.ENVIRONMENT }} ia-questions-${{ env.ENVIRONMENT }} ia-reports-${{ env.ENVIRONMENT }}; do
            aws lambda update-function-code \
              --function-name $fn \
              --s3-bucket ${{ secrets.LAMBDA_BUCKET_NAME }} \
              --s3-key backend/lambda.zip \
              --publish \
              --output text --query 'FunctionArn'
            aws lambda wait function-updated --function-name $fn
          done

  # ── Infrastructure: deploy CloudFormation stacks ─────────────────────────
  deploy-infra:
    needs: changes
    if: needs.changes.outputs.infra == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy auth stack (us-east-1 — matches Google OAuth redirect URL)
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation/auth.yml \
            --stack-name ia-auth-${{ env.ENVIRONMENT }} \
            --region us-east-1 \
            --parameter-overrides \
              Environment=${{ env.ENVIRONMENT }} \
              GoogleClientId=${{ secrets.GOOGLE_CLIENT_ID }} \
              GoogleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              FrontendUrl=https://interview-assistant.kotahirau.com \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Deploy database stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation/database.yml \
            --stack-name ia-database-${{ env.ENVIRONMENT }} \
            --parameter-overrides Environment=${{ env.ENVIRONMENT }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Deploy backend stack
        run: |
          # Auth stack is in us-east-1 — read from there
          USER_POOL_CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name ia-auth-${{ env.ENVIRONMENT }} \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`UserPoolClientId`].OutputValue' \
            --output text)
          USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name ia-auth-${{ env.ENVIRONMENT }} \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`UserPoolId`].OutputValue' \
            --output text)

          aws cloudformation deploy \
            --template-file infrastructure/cloudformation/backend.yml \
            --stack-name ia-backend-${{ env.ENVIRONMENT }} \
            --parameter-overrides \
              Environment=${{ env.ENVIRONMENT }} \
              LambdaS3Bucket=${{ secrets.LAMBDA_BUCKET_NAME }} \
              AiApiUrl=${{ secrets.AI_API_URL }} \
              AiApiKey=${{ secrets.AI_API_KEY }} \
              UserPoolClientId="$USER_POOL_CLIENT_ID" \
              UserPoolId="$USER_POOL_ID" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Deploy frontend stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation/frontend.yml \
            --stack-name ia-frontend-${{ env.ENVIRONMENT }} \
            --parameter-overrides \
              Environment=${{ env.ENVIRONMENT }} \
              DomainName=interview-assistant.kotahirau.com \
              HostedZoneId=${{ secrets.ROUTE53_HOSTED_ZONE_ID }} \
              CertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
